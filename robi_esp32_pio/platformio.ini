[env:lolin_s3_mini]
platform  = espressif32
board     = lolin_s3_mini
framework = arduino

; ── Upload ────────────────────────────────────────────
upload_port     = /dev/cu.usbmodem101
upload_protocol = esptool
monitor_port    = /dev/cu.usbmodem101
monitor_speed   = 115200

; ── Build flags ───────────────────────────────────────
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ── Libraries ─────────────────────────────────────────
lib_deps =
    olikraus/U8g2 @ ^2.35.7
    bblanchon/ArduinoJson @ ^7.3.1
